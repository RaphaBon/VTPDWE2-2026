<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="https://cdn.jsdelivr.net/npm/inputmask@5.0.8/dist/inputmask.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>

    <div class="container">
            <h1>Formulário de Cadastro!</h1>

        <form action="/login" method="post">

            <label for="name">Nome Completo:</label>
            <input type="text" required>

            <label for="phone">Telefone:</label>
            <input type="text" id="phone" placeholder="(**)*****-****" pattern="\([0-9]{2}\)[0-9]{4,6}-[0-9]{3,4}$" title="Digite o telefone no formato (DD)XXXXX-XXXX "
                required >
            
            <label for="date">Data de Nascimento:</label>
            <input type="date" name="date" id="" min="01/01/1926" required>


            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite o CPF no formato XXX.XXX.XXX-XX" required >

            <label for="e-mail">E-mail:</label>
            <input type="email" required>

            <label for="city">Cidade:</label>
            <input type="text" required>

            <label for="uf">Estado:</label>
            <select name="uf" id="uf" required> 
                <option value="SP">SP</option>
                <option value="DF">DF</option>
                <option value="RJ">RJ</option>
                <option value="MG">MG</option>
            </select>

            <label for="cep">CEP:</label>
            <input type="text" id="cep" pattern="\d{5}-\d{3}" title="Preencha o CEP no formato: XXXXX-XXX"  required>


            <label for="photo">Foto de Perfil:</label>
            <input type="file" id="photo" accept="image/*" required> 
            <label for="pdf">Contrato assinado (em PDF)</label>
            <input type="file" id="pdf" accept="application/pdf" required>
    

            <button type="submit" value="enviar" class="send">Enviar</button>
            <button type="reset" value="limpar" class="clean">Limpar</button>


        </form>
    </div>
</body>
</html>
